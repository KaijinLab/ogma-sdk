name: Validate types

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install TypeScript
        run: npm install --no-save typescript

      - name: Check index.d.ts compiles
        run: npx tsc --noEmit --strict index.d.ts
